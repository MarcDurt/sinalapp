let _portaCamadas = []; // [{tipo, recorte}]
let _portaCalcTimer = null;

function portaInitCamadas(){
  if(_portaCamadas.length === 0){
    _portaCamadas = [{ tipo:'vinil_jateado', recorte:false }];
    portaRenderCamadas();
  }
}

function portaAddCamada(){
  if(_portaCamadas.length >= 4) return;
  _portaCamadas.push({ tipo:'vinil_branco', recorte:false });
  portaRenderCamadas();
  portaCalcUpdate();
}

function portaRemoveCamada(idx){
  if(_portaCamadas.length <= 1) return;
  _portaCamadas.splice(idx, 1);
  portaRenderCamadas();
  portaCalcUpdate();
}

function portaSetTipo(idx, val){
  _portaCamadas[idx].tipo = val;
  portaCalcUpdate();
}

function portaSetRecorte(idx, val){
  _portaCamadas[idx].recorte = val;
  portaCalcUpdate();
}

function portaRenderCamadas(){
  const container = document.getElementById('porta-camadas');
  if(!container) return;
  const addBtn = document.getElementById('btn-porta-add-camada');
  if(addBtn) addBtn.style.opacity = _portaCamadas.length >= 4 ? '0.4' : '1';
  container.innerHTML = _portaCamadas.map((c, i) => {
    const opts = PORTA_MATERIAIS.map(m =>
      `<option value="${m.id}" ${c.tipo===m.id?'selected':''}>${m.label} — R$${m.preco.toFixed(2).replace('.',',')}/${m.unidade==='m2'?'m²':'m'}</option>`
    ).join('');
    const showRecorte = c.tipo !== 'microperfurado';
    return `
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:12px;font-weight:700;color:var(--text2)">CAMADA ${i+1}</span>
        ${_portaCamadas.length > 1 ? `<button onclick="portaRemoveCamada(${i})" style="padding:2px 8px;border-radius:4px;border:1px solid #f8717140;background:#f871711a;color:#f87171;font-size:11px;cursor:pointer;font-weight:600">✕ Remover</button>` : ''}
      </div>
      <select onchange="portaSetTipo(${i}, this.value)" style="width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text1);font-size:13px;margin-bottom:8px">
        ${opts}
      </select>
      ${showRecorte ? `<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer">
        <input type="checkbox" ${c.recorte?'checked':''} onchange="portaSetRecorte(${i}, this.checked)"
          style="width:14px;height:14px;cursor:pointer">
        Recorte eletrônico (+R$15,00/m de rolo)
      </label>` : ''}
    </div>`;
  }).join('');
}

function portaCalcUpdate(){
  clearTimeout(_portaCalcTimer);
  _portaCalcTimer = setTimeout(_portaCalcRun, 50);
}

function _portaRoloCalc(larg, alt, qtd){
  // Mesma lógica de orientação da Faixa
  const EFF_W = 112, EFF_L = 92, SPACING = 1;
  const fitsA = Math.floor(EFF_W / (alt + SPACING));
  const cabeA = larg <= EFF_L;
  const fitsB = Math.floor(EFF_L / (alt + SPACING));
  const cabeB = larg <= EFF_W;
  let faixasPorMetro, orientacao;
  if(cabeA){ faixasPorMetro=fitsA; orientacao='A'; }
  else if(cabeB){ faixasPorMetro=fitsB; orientacao='B'; }
  else{ faixasPorMetro=0; orientacao='X'; }

  let metrosRolo, orientLabel, emenda=false, numEmendas=1;
  if(faixasPorMetro===0){
    const faixasPorCamada = Math.floor(EFF_W / (alt + SPACING));
    if(faixasPorCamada===0){
      numEmendas = Math.ceil(alt / EFF_W);
      const metrosPorPeca = Math.ceil((larg/100) / 0.5) * 0.5;
      metrosRolo  = qtd * numEmendas * metrosPorPeca;
      orientLabel = `Orient. C+Emenda: ${numEmendas} tira(s) de ${metrosPorPeca}m × ${qtd} porta(s)`;
      emenda = true;
    } else {
      const metrosPorCamada = Math.ceil((larg/100) / 0.5) * 0.5;
      const numCamadas      = Math.ceil(qtd / faixasPorCamada);
      metrosRolo  = numCamadas * metrosPorCamada;
      orientLabel = `Orient. C: ${faixasPorCamada} fx/fileira × ${numCamadas} fileira(s) × ${metrosPorCamada}m`;
    }
  } else {
    const metrosBrutos = qtd / faixasPorMetro;
    metrosRolo  = Math.ceil(metrosBrutos * 2) / 2;
    orientLabel = orientacao==='A'
      ? `Orient. A: ${alt}cm × ${faixasPorMetro} peças/m nos 112cm`
      : `Orient. B: ${alt}cm × ${faixasPorMetro} peças/m nos 92cm`;
  }
  const areaM2 = qtd * (larg/100) * (alt/100);
  return { metrosRolo, orientLabel, emenda, numEmendas, areaM2 };
}

function _portaCalcRun(){
  const larg   = parseFloat(document.getElementById('p_larg')?.value||'80')||80;
  const alt    = parseFloat(document.getElementById('p_alt')?.value||'210')||210;
  const qtd    = parseInt(document.getElementById('p_qtd')?.value||'1')||1;
  const pInst  = parseFloat(document.getElementById('p_pinst')?.value||'30');
  const pCorte = parseFloat(document.getElementById('p_pcorte')?.value||'15');
  const desloc = parseFloat(document.getElementById('p_desloc')?.value||'30');
  const camadas = _portaCamadas;

  const fmt = v => 'R$ ' + v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.').replace(/\.(\d{3}),/,'.$1,');
  const deslocLabel = {15:'Mínimo',30:'5–15 km',50:'16–20 km',80:'21–30 km',100:'31–50 km'}[desloc]||'';

  const { metrosRolo, orientLabel, emenda, numEmendas, areaM2 } = _portaRoloCalc(larg, alt, qtd);

  // Calcula custo por camada
  let totalMaterial = 0, totalCorte = 0, totalRecorte = 0;
  const camadasDetalhes = camadas.map((c, i) => {
    const mat = PORTA_MATERIAIS.find(m => m.id === c.tipo) || PORTA_MATERIAIS[0];
    let custoMat, matDesc;
    if(mat.unidade === 'm2'){
      custoMat = Math.max(30, areaM2 * mat.preco);
      matDesc  = `${areaM2.toFixed(2)}m² × R$${mat.preco.toFixed(2).replace('.',',')}/m²`;
    } else {
      custoMat = Math.max(30, metrosRolo * mat.preco);
      matDesc  = `${metrosRolo.toFixed(1)}m de rolo × R$${mat.preco.toFixed(2).replace('.',',')}/m`;
    }
    const custoCorte = mat.unidade === 'm2' ? 0 : metrosRolo * pCorte;
    const custoRec   = c.recorte && mat.unidade !== 'm2' ? metrosRolo * 15 : 0;
    totalMaterial += custoMat;
    totalCorte    += custoCorte;
    totalRecorte  += custoRec;
    return { label:mat.label, custoMat, matDesc, custoCorte, custoRec, recorte:c.recorte && mat.unidade !== 'm2' };
  });

  // Instalação: escalonada por largura, ×qtd portas
  const instMetros = Math.ceil(Math.max(larg/100, 1.0) / 0.5) * 0.5;
  const custoInstalacao = instMetros * pInst * qtd;

  const C         = totalMaterial + totalCorte + totalRecorte + custoInstalacao + desloc;
  const oper      = C * 0.30;
  const com       = oper;
  const subtotal  = C + oper + com;
  const imposto   = subtotal * 0.10;
  const vista     = subtotal + imposto;
  const prazo     = vista * 1.10;

  const emendaBlock = emenda
    ? `<div style="color:#f59e0b;padding:10px 14px;background:#f59e0b18;border:1px solid #f59e0b50;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:12px">⚠️ Altura ${alt}cm > 112cm — <b>${numEmendas} tiras com emenda</b> por porta. Custo calculado com emenda.</div>`
    : '';

  const camadasRows = camadasDetalhes.map((cd, i) => `
    <div style="padding:4px 0 2px;border-bottom:1px solid var(--border)20">
      <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:2px">CAMADA ${i+1} — ${cd.label}</div>
      <div style="display:flex;justify-content:space-between;gap:8px"><span style="color:var(--text2)">Material (${cd.matDesc})</span><span style="font-weight:600;white-space:nowrap">${fmt(cd.custoMat)}</span></div>
      ${cd.custoCorte>0?`<div style="display:flex;justify-content:space-between;gap:8px"><span style="color:var(--text2)">Corte (${metrosRolo.toFixed(1)}m × ${fmt(pCorte)}/m)</span><span style="font-weight:600;white-space:nowrap">${fmt(cd.custoCorte)}</span></div>`:''}
      ${cd.recorte?`<div style="display:flex;justify-content:space-between;gap:8px"><span style="color:var(--text2)">Recorte eletrônico (${metrosRolo.toFixed(1)}m × R$15,00/m)</span><span style="font-weight:600;white-space:nowrap">${fmt(cd.custoRec)}</span></div>`:''}
    </div>`).join('');

  const porPorta = qtd > 1 ? `<div style="background:#22c55e18;border:1px solid #22c55e40;border-radius:8px;padding:10px 12px;margin-top:12px;text-align:center">
    <div style="font-size:11px;color:#22c55e;font-weight:700;margin-bottom:2px">POR PORTA (média)</div>
    <div style="font-size:22px;font-weight:800;color:#22c55e">${fmt(vista/qtd)}</div>
    <div style="font-size:12px;color:var(--text2)">à vista &nbsp;|&nbsp; ${fmt(prazo/qtd)} a prazo</div>
  </div>` : '';

  document.getElementById('porta-resultado').innerHTML = `
    ${emendaBlock}
    <h3 style="margin:0 0 14px;font-size:14px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em">📊 Breakdown do Cálculo</h3>
    <div style="font-size:12px;line-height:1.9;font-family:monospace">
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px">${orientLabel}</div>
      ${camadasRows}
      <div style="display:flex;justify-content:space-between;padding:4px 0 2px;border-bottom:1px solid var(--border)20;gap:8px">
        <span style="color:var(--text2)">Instalação (${qtd} porta(s) × ${instMetros.toFixed(1)}m × ${fmt(pInst)}/m)</span>
        <span style="font-weight:600;white-space:nowrap">${fmt(custoInstalacao)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border);gap:8px">
        <span style="color:var(--text2)">Deslocamento (${deslocLabel})</span>
        <span style="font-weight:600;white-space:nowrap">${fmt(desloc)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:5px 0 2px;gap:8px">
        <span style="color:var(--text2)">Custo Total (C)</span>
        <span style="font-weight:700;white-space:nowrap">${fmt(C)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:2px 0;color:var(--text2);gap:8px">
        <span>Operacional (30%)</span><span>${fmt(oper)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:2px 0;color:var(--text2);gap:8px">
        <span>Comissão (100% do oper.)</span><span>${fmt(com)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border);color:var(--text2);gap:8px">
        <span>Imposto (10%)</span><span>${fmt(imposto)}</span>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px">
      <div style="background:var(--primary)18;border:1px solid var(--primary)40;border-radius:8px;padding:12px;text-align:center">
        <div style="font-size:11px;color:var(--primary);font-weight:700;margin-bottom:2px">À VISTA</div>
        <div style="font-size:24px;font-weight:800;color:var(--primary)">${fmt(vista)}</div>
        <div style="font-size:11px;color:var(--text2)">C × 1,76</div>
      </div>
      <div style="background:#f59e0b18;border:1px solid #f59e0b40;border-radius:8px;padding:12px;text-align:center">
        <div style="font-size:11px;color:#f59e0b;font-weight:700;margin-bottom:2px">A PRAZO</div>
        <div style="font-size:24px;font-weight:800;color:#f59e0b">${fmt(prazo)}</div>
        <div style="font-size:11px;color:var(--text2)">À vista × 1,10</div>
      </div>
    </div>

    ${porPorta}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px">
      <button onclick="portaGerarOrcamento()" style="padding:11px;background:var(--primary);color:white;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">
        📄 Criar Orçamento
      </button>
      <button onclick="portaMostrarExistentes()" style="padding:11px;background:transparent;color:var(--primary);border:2px solid var(--primary);border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">
        ➕ Adicionar a Existente
      </button>
    </div>

    <div id="porta-existentes-panel" style="display:none;margin-top:12px;border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--bg)">
      <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">SELECIONE O ORÇAMENTO:</div>
      <div id="porta-existentes-list" style="display:grid;gap:6px;max-height:220px;overflow-y:auto"></div>
    </div>
  `;

  window._portaDados = { larg, alt, qtd, pInst, pCorte, desloc, deslocLabel, camadas:JSON.parse(JSON.stringify(camadas)),
    metrosRolo, orientLabel, emenda, numEmendas, areaM2, camadasDetalhes,
    totalMaterial, totalCorte, totalRecorte, custoInstalacao, instMetros, C, vista, prazo };
}

function portaGerarOrcamento(){
  if(!window._portaDados) return;
  const d = window._portaDados;
  const camadasDesc = d.camadasDetalhes.map((cd, i) => `Camada ${i+1}: ${cd.label}`).join(' + ');
  const descViva = `Fornecimento e instalação de adesivo em ${d.qtd} porta(s) ${d.larg}×${d.alt}cm. ${camadasDesc}. Deslocamento incluso (${d.deslocLabel}).`;
  formOrc = {
    id: null, numero: gerarCodigo(), cliente: '', empresa: '', telefone: '', email: '',
    data: today(), prazo_entrega: 7, status: 'Aberto', descricao: '',
    servicos: [{
      item: `Adesivo de Porta ${d.larg}×${d.alt}cm`,
      descricao: descViva,
      unidades: d.qtd,
      operacional_pct: 30, comissao_pct: 100, imposto_pct: 10, juros_pct: 10,
      preco_final: parseFloat(d.prazo.toFixed(2)),
      itens: []
    }],
    responsavel: 'Marcelo'
  };
  formCalcs = [];
  orcTab = 'novo';
  goTab('orcamentos');
}

function portaMostrarExistentes(){
  const panel = document.getElementById('porta-existentes-panel');
  const list  = document.getElementById('porta-existentes-list');
  if(!panel || !list) return;
  if(panel.style.display !== 'none'){ panel.style.display='none'; return; }
  const ativos = (S.orcamentos||[]).filter(o=>o.status!=='Arquivado').sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  if(!ativos.length){
    list.innerHTML = '<div style="color:var(--text2);font-size:13px;padding:8px">Nenhum orçamento ativo encontrado.</div>';
  } else {
    list.innerHTML = ativos.map(o=>`
      <button onclick="portaAdicionarExistente('${o.id}')" style="display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text1);cursor:pointer;text-align:left;gap:8px">
        <div>
          <div style="font-weight:700;font-size:13px">#${o.numero} — ${o.cliente||o.empresa||'(sem nome)'}</div>
          <div style="font-size:11px;color:var(--text2)">${o.data||''} · ${o.status||''} · ${(o.servicos||[]).length} serviço(s)</div>
        </div>
        <span style="font-size:12px;color:var(--primary);white-space:nowrap">➕ Adicionar</span>
      </button>`).join('');
  }
  panel.style.display='block';
}

function portaAdicionarExistente(orcId){
  if(!window._portaDados) return;
  const d = window._portaDados;
  const orc = (S.orcamentos||[]).find(o=>o.id===orcId);
  if(!orc){ alert('Orçamento não encontrado.'); return; }
  formOrc = JSON.parse(JSON.stringify(orc));
  formCalcs = [];
  formOrc.servicos = formOrc.servicos || [];
  const camadasDesc = d.camadasDetalhes.map((cd,i)=>`Camada ${i+1}: ${cd.label}`).join(' + ');
  const descViva = `Fornecimento e instalação de adesivo em ${d.qtd} porta(s) ${d.larg}×${d.alt}cm. ${camadasDesc}. Deslocamento incluso (${d.deslocLabel}).`;
  formOrc.servicos.push({
    item: `Adesivo de Porta ${d.larg}×${d.alt}cm`,
    descricao: descViva,
    unidades: d.qtd,
    operacional_pct: 30, comissao_pct: 100, imposto_pct: 10, juros_pct: 10,
    preco_final: parseFloat(d.prazo.toFixed(2)),
    itens: []
  });
  orcTab = 'editar';
  goTab('orcamentos');
}

function geralCalcUpdate(){clearTimeout(_geralCalcTimer);_geralCalcTimer=setTimeout(_geralCalcRun,50);}
function _geralCalcRun(){
  const larg=parseFloat(document.getElementById('g_larg')?.value||'100')||100;
  const alt=parseFloat(document.getElementById('g_alt')?.value||'100')||100;
  const qtd=parseInt(document.getElementById('g_qtd')?.value||'1')||1;
  const pInst=parseFloat(document.getElementById('g_pinst')?.value||'30');
  const pCorte=parseFloat(document.getElementById('g_pcorte')?.value||'15');
  const desloc=parseFloat(document.getElementById('g_desloc')?.value||'30');
  const fmt=v=>'R$ '+v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.').replace(/\.(\d{3}),/,'.$1,');
  const deslocLabel={15:'Mínimo',30:'5–15 km',50:'16–20 km',80:'21–30 km',100:'31–50 km'}[desloc]||'';
  const {metrosRolo,orientLabel,emenda,numEmendas,areaM2}=_portaRoloCalc(larg,alt,qtd);
  let totalMat=0,totalCorte=0,totalRecorte=0;
  const camDetalhes=_geralCamadas.map((c,i)=>{
    const mat=PORTA_MATERIAIS.find(m=>m.id===c.tipo)||PORTA_MATERIAIS[0];
    let custoMat,matDesc;
    if(mat.unidade==='m2'){custoMat=Math.max(30,areaM2*mat.preco);matDesc=`${areaM2.toFixed(2)}m² × R$${mat.preco.toFixed(2).replace('.',',')}/m²`;}
    else{custoMat=Math.max(30,metrosRolo*mat.preco);matDesc=`${metrosRolo.toFixed(1)}m × R$${mat.preco.toFixed(2).replace('.',',')}/m`;}
    const custoCorte=mat.unidade==='m2'?0:metrosRolo*pCorte;
    const custoRec=c.recorte&&mat.unidade!=='m2'?metrosRolo*15:0;
    totalMat+=custoMat;totalCorte+=custoCorte;totalRecorte+=custoRec;
    return{label:mat.label,custoMat,matDesc,custoCorte,custoRec,recorte:c.recorte&&mat.unidade!=='m2'};
  });
  const instMetros=Math.ceil(Math.max(larg/100,1.0)/0.5)*0.5;
  const custoInst=instMetros*pInst*qtd;
  const C=totalMat+totalCorte+totalRecorte+custoInst+desloc;

};
let _placaEsp='3mm',_placaMatId='acrilico',_placaTimer=null,_placaImpType='digital';
function placaInit(){_placaEsp='3mm';_placaMatId='acrilico';_placaImpType='digital';_placaRenderMatBtns();placaSetEsp('3mm');setTimeout(()=>placaSetImpType('digital'),10);}
function _placaRenderMatBtns(){
  const mats=PLACA_MATS[_placaEsp];const cont=document.getElementById('placa-mat-btns');if(!cont)return;
  cont.innerHTML=mats.map(m=>{const active=m.id===_placaMatId;return`<button id="pmbtn-${m.id}" onclick="placaSetMat('${m.id}')" style="padding:7px 4px;border-radius:6px;border:1px solid ${active?'var(--primary)':'var(--border)'};background:${active?'var(--primary)':'transparent'};color:${active?'white':'var(--text2)'};font-weight:${active?'700':'600'};font-size:12px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.label}</button>`;}).join('');
}
function placaSetEsp(esp){
  _placaEsp=esp;
  ['3mm','5mm'].forEach(e=>{const btn=document.getElementById('pbtn-'+e);if(!btn)return;if(e===esp){btn.style.background='var(--primary)';btn.style.color='white';btn.style.borderColor='var(--primary)';}else{btn.style.background='transparent';btn.style.color='var(--text2)';btn.style.borderColor='var(--border)';}});
  const ids=PLACA_MATS[esp].map(m=>m.id);if(!ids.includes(_placaMatId))_placaMatId='acrilico';
  _placaRenderMatBtns();_placaUpdateCorteImp();placaCalcUpdate();
}
function placaSetImpType(type){
  _placaImpType=type;
  ['digital','uv'].forEach(t=>{const btn=document.getElementById('pimp-btn-'+t);if(!btn)return;if(t===type){btn.style.background='var(--primary)';btn.style.color='white';btn.style.borderColor='var(--primary)';}else{btn.style.background='transparent';btn.style.color='var(--text2)';btn.style.borderColor='var(--border)';}});
  const vernizRow=document.getElementById('placa-verniz-row');if(vernizRow)vernizRow.style.display=type==='uv'?'block':'none';
  const laminRow=document.getElementById('placa-lamin-row');if(laminRow)laminRow.style.display=type==='digital'?'block':'none';
  if(type!=='uv'){const vEl=document.getElementById('p_verniz');if(vEl)vEl.checked=false;}
  if(type!=='digital'){const lEl=document.getElementById('p_lamin');if(lEl)lEl.checked=false;}
  placaCalcUpdate();
}
function placaSetMat(matId){_placaMatId=matId;_placaRenderMatBtns();_placaUpdateCorteImp();placaSetImpType(matId==='aco'?'uv':'digital');}
function _placaGetMat(){return(PLACA_MATS[_placaEsp]||[]).find(m=>m.id===_placaMatId)||PLACA_MATS['3mm'][0];}
function _placaAutoCorteImp(mat,larg,alt){const area_m2=(larg*alt)/10000;return{corte:parseFloat((Math.max(10,area_m2*mat.taxa_corte)).toFixed(2)),imp:mat.taxa_imp>0?parseFloat((Math.max(10,area_m2*mat.taxa_imp)).toFixed(2)):0};}
function _placaUpdateCorteImp(){const mat=_placaGetMat();const larg=parseFloat(document.getElementById('p_larg')?.value)||30;const alt=parseFloat(document.getElementById('p_alt')?.value)||8;const {corte,imp}=_placaAutoCorteImp(mat,larg,alt);const setV=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};setV('p_pcorte',corte);setV('p_pimp',imp);}
function placaOnDimChange(){_placaUpdateCorteImp();placaCalcUpdate();}
function placaToggleInst(on){const el=document.getElementById('p_pinst');if(!el)return;if(!on)el.value=0;else el.value=10;placaCalcUpdate();}
function placaCalcUpdate(){clearTimeout(_placaTimer);_placaTimer=setTimeout(_placaCalcRun,50);}
function _placaCalcRun(){
  const larg=parseFloat(document.getElementById('p_larg')?.value)||30;
  const alt=parseFloat(document.getElementById('p_alt')?.value)||8;
  const qtd=parseInt(document.getElementById('p_qtd')?.value)||1;
  const mat=_placaGetMat();
  const fmt=v=>'R$ '+v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.').replace(/\.(\d{3}),/,'.$1,');
  const instOn=document.getElementById('p_inst_on')?.checked!==false;
  const deslocSel=parseFloat(document.getElementById('p_desloc')?.value)||30;
  const desloc=qtd>5?Math.max(deslocSel,50):deslocSel;
  const deslocLabel={15:'Mínimo',30:'5–15 km',50:'16–20 km',80:'21–30 km',100:'31–50 km'}[desloc]||`R$${desloc}`;
  const ppc=Math.max(1,Math.floor(mat.chapa_w/(larg+1))*Math.floor(mat.chapa_h/(alt+1)));
  const num_chapas=Math.ceil(qtd/ppc),custo_mat=num_chapas*mat.preco_chapa;
  const area_m2=(larg*alt)/10000;
  const c_corte=parseFloat(document.getElementById('p_pcorte')?.value)||0;
  const c_imp=parseFloat(document.getElementById('p_pimp')?.value)||0;
  const vernizOn=document.getElementById('p_verniz')?.checked===true;
  const laminOn=document.getElementById('p_lamin')?.checked===true;
  const c_verniz=(mat.taxa_imp>0&&_placaImpType==='uv'&&vernizOn)?10:0;
  const c_lamin=(mat.taxa_imp>0&&_placaImpType==='digital'&&laminOn)?10:0;
  const c_inst=parseFloat(document.getElementById('p_pinst')?.value)||0;
  const c_fix=parseFloat(document.getElementById('p_pfixacao')?.value)||0;
  const matLbl=document.getElementById('p_mat_label');
  const taxaLabel=mat.taxa_corte===150?'Laser Fibra':'Router';
  const impLabel=_placaImpType==='uv'?'Impressão UV':'Impressão Digital';
  if(matLbl)matLbl.textContent=`${num_chapas} chapa(s) ${mat.label} (${mat.chapa_w}×${mat.chapa_h}cm) · ${ppc} pçs/chapa = ${fmt(custo_mat)} | Corte ${taxaLabel}: ${fmt(c_corte)}/pç · ${mat.taxa_imp>0?impLabel+': '+fmt(c_imp)+'/pç':'sem impressão'}`;
  const instStr=instOn?' e instalação':'';
  const hasImp=mat.taxa_imp>0;
  const impDescStr=hasImp?(_placaImpType==='uv'?'Impressão UV diretamente na chapa e recorte especial'+(vernizOn?' com aplicação de verniz fosco':''):(laminOn?'Impressão digital com informações em adesivo e recorte especial com aplicação de laminação em adesivo transparente':'Impressão digital com informações em adesivo e recorte')):'Recorte a laser especial';
  const descFinal=qtd>1?`Fornecimento${instStr} de ${qtd} placas de identificação em ${mat.label}, ${larg}×${alt} cm. ${impDescStr}. Fixação com dupla face. Deslocamento incluso (${deslocLabel}).`:`Fornecimento${instStr} de placa de identificação em ${mat.label}, ${larg}×${alt} cm. ${impDescStr}. Fixação com dupla face. Deslocamento incluso (${deslocLabel}).`;
  const descPrev=document.getElementById('p_desc_preview');if(descPrev)descPrev.textContent=descFinal;
  const C=custo_mat+(c_corte+c_imp+c_verniz+c_lamin+(instOn?c_inst:0)+c_fix)*qtd+desloc;
  const oper=C*0.30,com=oper,sub=C+oper+com,imp=sub*0.10;
  const vista=Math.ceil(sub+imp),prazo=Math.ceil(vista*1.10);
  const rowUnit=(label,val)=>val>0?`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border)20;gap:8px"><span style="color:var(--text2)">${label}</span><span style="font-weight:600;white-space:nowrap">${fmt(val)}</span></div>`:'';
  const porUnid=qtd>1?`<div style="background:#22c55e18;border:1px solid #22c55e40;border-radius:8px;padding:10px 12px;margin-top:12px;text-align:center"><div style="font-size:11px;color:#22c55e;font-weight:700;margin-bottom:2px">POR UNIDADE (média)</div><div style="font-size:22px;font-weight:800;color:#22c55e">${fmt(vista/qtd)}</div><div style="font-size:12px;color:var(--text2)">à vista &nbsp;|&nbsp; ${fmt(prazo/qtd)} a prazo</div></div>`:'';
  const deslocNote=qtd>5&&deslocSel<50?`<div style="color:#f59e0b;font-size:11px;margin-top:4px">⚠️ +5 peças: deslocamento ajustado para R$50,00</div>`:'';
  document.getElementById('placa-resultado').innerHTML=`<h3 style="margin:0 0 14px;font-size:14px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em">📊 Breakdown</h3><div style="font-size:11px;color:var(--text2);margin-bottom:8px">${mat.label} — ${larg}×${alt}cm — ${qtd}un</div><div style="font-size:12px;line-height:1.9;font-family:monospace">${rowUnit(`Material (${num_chapas} chapa${num_chapas>1?'s':''}, ${ppc} pçs/chapa)`,custo_mat)}${rowUnit(`Corte ${taxaLabel}${qtd>1?' × '+qtd:''}`,c_corte*qtd)}${c_imp>0?rowUnit(`${_placaImpType==='uv'?'Impressão UV':'Impressão Digital'}${qtd>1?' × '+qtd:''}`,c_imp*qtd):''}${c_verniz>0?rowUnit(`Verniz fosco${qtd>1?' × '+qtd:''}`,c_verniz*qtd):''}${c_lamin>0?rowUnit(`Laminação${qtd>1?' × '+qtd:''}`,c_lamin*qtd):''}${instOn&&c_inst>0?rowUnit(`Instalação${qtd>1?' × '+qtd:''}`,c_inst*qtd):''}${rowUnit(`Fixação${qtd>1?' × '+qtd:''}`,c_fix*qtd)}<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border);gap:8px"><span style="color:var(--text2)">Deslocamento (${deslocLabel})</span><span style="font-weight:600;white-space:nowrap">${fmt(desloc)}</span></div>${deslocNote}<div style="display:flex;justify-content:space-between;padding:5px 0 2px;gap:8px"><span style="color:var(--text2)">Custo Total (C)</span><span style="font-weight:700;white-space:nowrap">${fmt(C)}</span></div><div style="display:flex;justify-content:space-between;padding:2px 0;color:var(--text2);gap:8px"><span>Operacional + Comissão (60%)</span><span>${fmt(oper+com)}</span></div><div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border);color:var(--text2);gap:8px"><span>Imposto (10%)</span><span>${fmt(imp)}</span></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px"><div style="background:var(--primary)18;border:1px solid var(--primary)40;border-radius:8px;padding:12px;text-align:center"><div style="font-size:11px;color:var(--primary);font-weight:700;margin-bottom:2px">À VISTA</div><div style="font-size:24px;font-weight:800;color:var(--primary)">${fmt(vista)}</div></div><div style="background:#f59e0b18;border:1px solid #f59e0b40;border-radius:8px;padding:12px;text-align:center"><div style="font-size:11px;color:#f59e0b;font-weight:700;margin-bottom:2px">A PRAZO</div><div style="font-size:24px;font-weight:800;color:#f59e0b">${fmt(prazo)}</div></div></div>${porUnid}<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px"><button onclick="placaGerarOrcamento()" style="padding:11px;background:var(--primary);color:white;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">📄 Criar Orçamento</button><button onclick="placaMostrarExistentes()" style="padding:11px;background:transparent;color:var(--primary);border:2px solid var(--primary);border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">➕ Adicionar a Existente</button></div><div id="placa-existentes-panel" style="display:none;margin-top:12px;border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--bg)"><div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">SELECIONE O ORÇAMENTO:</div><div id="placa-existentes-list" style="display:grid;gap:6px;max-height:220px;overflow-y:auto"></div></div>`;
  window._placaDados={larg,alt,qtd,desloc,deslocLabel,mat,esp:_placaEsp,num_chapas,ppc,custo_mat,c_corte,c_imp,c_verniz,c_lamin,c_inst:instOn?c_inst:0,c_fix,C,vista,prazo,desc:descFinal,instOn,impType:_placaImpType};
}
function placaGerarOrcamento(){
  if(!window._placaDados)return;const d=window._placaDados;
  formOrc={id:null,numero:gerarCodigo(),cliente:'',empresa:'',telefone:'',email:'',data:today(),prazo_entrega:5,status:'Aberto',descricao:'',servicos:[{item:`Placa de Identificação ${d.mat.label} ${d.larg}×${d.alt}cm`,descricao:d.desc,unidades:d.qtd,operacional_pct:30,comissao_pct:100,imposto_pct:10,juros_pct:10,preco_final:parseFloat(d.prazo.toFixed(2)),itens:[]}],responsavel:'Marcelo'};
  formCalcs=[];orcTab='novo';goTab('orcamentos');
}
function placaMostrarExistentes(){
  const panel=document.getElementById('placa-existentes-panel'),list=document.getElementById('placa-existentes-list');
  if(!panel||!list)return;if(panel.style.display!=='none'){panel.style.display='none';return;}
  const ativos=(S.orcamentos||[]).filter(o=>o.status!=='Arquivado').sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  list.innerHTML=ativos.length?ativos.map(o=>`<button onclick="placaAdicionarExistente('${o.id}')" style="display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text1);cursor:pointer;text-align:left;gap:8px"><div><div style="font-weight:700;font-size:13px">#${o.numero} — ${o.cliente||o.empresa||'(sem nome)'}</div><div style="font-size:11px;color:var(--text2)">${o.data||''} · ${(o.servicos||[]).length} serviço(s)</div></div><span style="font-size:12px;color:var(--primary);white-space:nowrap">➕</span></button>`).join(''):'<div style="color:var(--text2);font-size:13px;padding:8px">Nenhum orçamento ativo.</div>';
  panel.style.display='block';
}
function placaAdicionarExistente(orcId){
  if(!window._placaDados)return;const d=window._placaDados;
  const orc=(S.orcamentos||[]).find(o=>o.id===orcId);if(!orc)return;
  formOrc=JSON.parse(JSON.stringify(orc));formCalcs=[];formOrc.servicos=formOrc.servicos||[];
  formOrc.servicos.push({item:`Placa de Identificação ${d.mat.label} ${d.larg}×${d.alt}cm`,descricao:d.desc,unidades:d.qtd,operacional_pct:30,comissao_pct:100,imposto_pct:10,juros_pct:10,preco_final:parseFloat(d.prazo.toFixed(2)),itens:[]});
  orcTab='editar';goTab('orcamentos');
}

</script>
